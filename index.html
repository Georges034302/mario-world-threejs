<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="js/three.min.js"></script>
        <link rel="icon" href="data:,">
        <link rel="stylesheet" href="css/layout.css?v=2.0">
        <title>Mario World</title>
    </head>

    <body>
        <div id="info">
            <p id="pageTitle">Mario World <span id="pageLevel">Level 1</span></p>
        </div>
        <div id="quickControls" aria-label="Quick controls">
            <strong>Quick Controls</strong>
            <span>← slow</span>
            <span>→ fast</span>
            <span>↑ super</span>
            <span>↑ + → superfly</span>
            <span>Space start/pause/resume</span>
            <span>Tab new game (after game over or win)</span>
        </div>
        <div id="gameStatus" aria-live="polite"></div>
        <div id="hud" aria-label="Game stats">
            <div class="hud-row"><span class="hud-label">Score</span><span id="hud-score">0</span></div>
            <div class="hud-row"><span class="hud-label">Health</span><span id="hud-health">&#9829;&#9829;&#9829;</span></div>
            <div class="hud-row"><span class="hud-label">Speed</span><span id="hud-speed">0.11</span></div>
            <div class="hud-row"><span class="hud-label">Time</span><span id="hud-time">00:00.000</span></div>
        </div>
        <img id="marioOverlay" src="media/mario.gif" alt="Mario">
        <script src="src/setup.js?v=2.0"></script>
        <script src="src/forest_theme.js?v=2.0"></script>
        <script src="src/build.js?v=2.0"></script>
        <script src="src/bats.js?v=2.0"></script>
        <script src="src/spiders.js?v=2.0"></script>
        <script src="src/animate.js?v=2.0"></script>
        <script src="src/run.js?v=2.0"></script>
    </body>
</html>
